services:
  rag-api:
    build: .
    container_name: rag-langgraphjs-course
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - ollama
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    container_name: rag-langgraphjs-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  ollama-data:
